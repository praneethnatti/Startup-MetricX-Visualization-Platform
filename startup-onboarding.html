<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Startup Details | Metrics Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

<div class="form-box">
    <h2>Enter Your Startup Details</h2>

    <form id="startupForm">
        <input type="text" placeholder="Startup Name" required>
        
        <select required>
            <option value="">Select Industry</option>
            <option>Technology</option>
            <option>Healthcare</option>
            <option>Finance</option>
            <option>E-commerce</option>
            <option>Education</option>
        </select>

        <input type="number" placeholder="Monthly Revenue ($)" required>
        <input type="number" placeholder="Number of Customers" required>
        <input type="number" placeholder="Number of Employees" required>

        <button type="submit">Submit Details</button>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
